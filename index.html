<!DOCTYPE html>
<html>
<head>
<title>Kuldeep Hospital</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(to right,#36d1dc,#5b86e5);
  text-align:center;
}

.box {
  background:white;
  padding:20px;
  margin:40px auto;
  width:300px;
  border-radius:10px;
}

input, select {
  width:90%;
  padding:10px;
  margin:5px;
}

button {
  padding:10px;
  background:green;
  color:white;
  border:none;
}

table {
  width:90%;
  margin:auto;
  border-collapse:collapse;
}

th, td {
  border:1px solid black;
  padding:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>Login</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none;">

<h2>Kuldeep Hospital</h2>

<input type="text" id="name" placeholder="Enter name">

<select id="dept">
<option>OPD</option>
<option>XRAY</option>
<option>LAB</option>
</select>

<button onclick="addPatient()">Add</button>

<h3>Current: <span id="current">None</span></h3>

<button onclick="nextPatient()">Next</button>

<table>
<tr><th>Name</th><th>Dept</th><th>Token</th></tr>
<tbody id="list"></tbody>
</table>

</div>

<script>

let token = 1;
let queue = [];

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("appBox").style.display="block";
}else{
alert("Wrong username or password");
}
}

function addPatient(){
let name=document.getElementById("name").value;
let dept=document.getElementById("dept").value;

if(name===""){
alert("Enter name");
return;
}

queue.push({name,dept,token});
token++;

showList();
document.getElementById("name").value="";
}

function showList(){
let list=document.getElementById("list");
list.innerHTML="";

queue.forEach(p=>{
list.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.dept}</td>
<td>${p.token}</td>
</tr>
`;
});
}

function nextPatient(){
if(queue.length===0) return;

let p=queue.shift();
document.getElementById("current").innerText=p.name;

showList();
}

</script>

</body>
</html>
