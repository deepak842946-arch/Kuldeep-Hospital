    .box {
      background: white;
      padding: 20px;

      width: 300px;
      border-radius: 10px;

    input {
      width: 90%;
      padding: 10px;

    }

    button {

  </style>
</head>

</div>

  <script>
    function login() {
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;

      if (u === "admin" && p === "1234") {
